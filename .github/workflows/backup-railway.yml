name: Railway Backup & Restore

on:
  schedule:
    # Backup every 4 hours
    - cron: '0 */4 * * *'
    # Daily backup at midnight UTC
    - cron: '0 0 * * *'
    # Weekly backup on Sunday at 2 AM
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'backup'
        type: choice
        options:
          - backup
          - restore
          - restore-latest
          - list
          - verify
      backup_id:
        description: 'Backup ID to restore'
        required: false
        type: string

env:
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  SUPABASE_BUCKET: open-connect-backups
  BACKUP_PREFIX: backups

jobs:
  # ============================================================
  # Job 1: Create Backup
  # ============================================================
  backup:
    name: Create Backup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.action == 'backup' || github.event.inputs.action == 'restore-latest'
    outputs:
      backup_name: ${{ steps.backup.outputs.backup_name }}
      backup_size: ${{ steps.backup.outputs.backup_size }}
      backup_status: ${{ steps.backup.outputs.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backup
        id: backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_NAME="open-connect-backup-${TIMESTAMP}"
          BACKUP_DIR="/tmp/open-connect-backups/${BACKUP_NAME}"
          FINAL_DIR="/tmp/open-connect-backups"
          mkdir -p "${BACKUP_DIR}"
          mkdir -p "${FINAL_DIR}"
          
          echo "📦 Creating backup at ${TIMESTAMP}"
          
          # ============================================================
          # In Railway, we need to get data from the running container
          # We'll use Railway CLI to execute commands
          # ============================================================
          
          # Setup Railway CLI
          curl -fsSL https://railway.app/install.sh | sh
          export PATH="$HOME/.railway/bin:$PATH"
          echo "$RAILWAY_TOKEN" | railway login --token 2>/dev/null || true
          
          # Get Railway Nixpacks/Runtime info
          RAILWAY_SERVICE_ID="${{ secrets.RAILWAY_SERVICE_ID }}"
          
          # Create backup metadata
          cat > "${BACKUP_DIR}/metadata.json" << EOF
          {
            "backup_date": "${TIMESTAMP}",
            "app_version": "${{ github.ref_name }}",
            "git_commit": "${{ github.sha }}",
            "backup_tool": "github-actions-backup",
            "run_id": "${{ github.run_id }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "backup_type": "scheduled",
            "retention_days": 14
          }
          EOF
          
          # Note: In production Railway deployment, the actual data backup
          # would be done via Railway's volume snapshot feature or
          # by executing backup commands inside the container
          
          # For now, create a backup manifest that Railway can use
          cat > "${BACKUP_DIR}/backup_manifest.json" << EOF
          {
            "version": "1.0",
            "created_at": "${TIMESTAMP}",
            "include_files": [
              "/app/backend/data/webui.db",
              "/app/backend/data/uploads/*",
              "/app/backend/data/knowledge/*",
              "/app/backend/data/chat_history/*",
              "/app/backend/.webui_secret_key"
            ],
            "exclude_files": [
              "*.log",
              "*.tmp",
              "__pycache__/*"
            ]
          }
          EOF
          
          # Create backup info file for restore workflow
          cat > "${FINAL_DIR}/latest_backup_info.json" << EOF
          {
            "backup_name": "${BACKUP_NAME}",
            "timestamp": "${TIMESTAMP}",
            "run_id": "${{ github.run_id }}",
            "commit": "${{ github.sha }}"
          }
          EOF
          
          # Create archive
          cd /tmp/open-connect-backups
          tar -czf "${BACKUP_NAME}.tar.gz" "${BACKUP_NAME}" 2>/dev/null || true
          ARCHIVE_SIZE=$(du -h "${BACKUP_NAME}.tar.gz" 2>/dev/null | cut -f1 || echo "0")
          rm -rf "${BACKUP_DIR}"
          
          echo "backup_name=${BACKUP_NAME}.tar.gz" >> $GITHUB_OUTPUT
          echo "backup_size=${ARCHIVE_SIZE}" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT
          
          echo "✅ Backup created: ${BACKUP_NAME}.tar.gz (${ARCHIVE_SIZE})"

      - name: Upload backup to Supabase Storage
        if: env.SUPABASE_PROJECT_REF != ''
        run: |
          echo "📤 Uploading to Supabase Storage..."
          
          BACKUP_FILE="/tmp/open-connect-backups/${{ steps.backup.outputs.backup_name }}"
          
          if [[ -f "$BACKUP_FILE" ]]; then
            # Create storage bucket if needed
            curl -s -X POST \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/storage/buckets" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"name": "open-connect-backups", "public": false}' 2>/dev/null || true
            
            # Upload backup
            UPLOAD_RESULT=$(curl -s -X POST \
              "https://api.supabase.com/v1/storage/${SUPABASE_BUCKET}/objects/upload" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @"$BACKUP_FILE" \
              "${BACKUP_PREFIX}/${{ steps.backup.outputs.backup_name }}" 2>/dev/null)
            
            if echo "$UPLOAD_RESULT" | grep -q '"error"'; then
              echo "⚠️ Supabase upload may have failed: $UPLOAD_RESULT"
            else
              echo "✅ Backup uploaded to Supabase"
            fi
          fi

      - name: Store backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ steps.backup.outputs.backup_name }}
          path: /tmp/open-connect-backups/${{ steps.backup.outputs.backup_name }}
          retention-days: 30

      - name: Cleanup old backups
        run: |
          echo "🧹 Cleaning up old backups..."
          find /tmp/open-connect-backups -name "*.tar.gz" -mtime +14 -delete 2>/dev/null || true
          echo "✅ Cleanup complete"

  # ============================================================
  # Job 2: Restore from Backup
  # ============================================================
  restore:
    name: Restore from Backup
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'restore' || github.event.inputs.action == 'restore-latest'
    environment: restore
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          export PATH="$HOME/.railway/bin:$PATH"
          echo "$RAILWAY_TOKEN" | railway login --token 2>/dev/null || true

      - name: Get backup info
        id: backup_info
        run: |
          BACKUP_ID="${{ github.event.inputs.backup_id }}"
          
          if [[ "$BACKUP_ID" == "latest" ]] || [[ "${{ github.event.inputs.action }}" == "restore-latest" ]]; then
            echo "📥 Restoring from latest backup..."
            
            # Download latest backup from Supabase
            if [[ -n "$SUPABASE_PROJECT_REF" ]]; then
              # Get latest backup from Supabase
              LATEST_BACKUP=$(curl -s \
                "https://api.supabase.com/v1/storage/${SUPABASE_BUCKET}/objects/list" \
                -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                -d '{"prefix": "backups/", "sortBy": {"column": "created_at", "order": "desc"}}' 2>/dev/null | \
                jq -r '.[0].name' 2>/dev/null || echo "")
              
              if [[ -n "$LATEST_BACKUP" ]]; then
                echo "Found backup: $LATEST_BACKUP"
                curl -s -L \
                  "https://api.supabase.com/v1/storage/${SUPABASE_BUCKET}/objects/download/${LATEST_BACKUP}" \
                  -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                  -o "/tmp/restore_backup.tar.gz"
              fi
            fi
          else
            echo "📥 Restoring backup: $BACKUP_ID"
          fi
          
          # Download artifact if specified
          if [[ -n "$BACKUP_ID" ]] && [[ "$BACKUP_ID" != "latest" ]]; then
            echo "Downloading artifact: $BACKUP_ID"
            # Would use actions/download-artifact here
          fi

      - name: Extract backup
        run: |
          echo "📦 Extracting backup..."
          
          if [[ -f "/tmp/restore_backup.tar.gz" ]]; then
            mkdir -p /tmp/restore_extract
            tar -xzf /tmp/restore_backup.tar.gz -C /tmp/restore_extract/
            ls -la /tmp/restore_extract/
            echo "✅ Backup extracted"
          else
            echo "⚠️ No backup file found, will create new database"
          fi

      - name: Upload restore package to Railway
        run: |
          echo "📤 Preparing restore package..."
          
          # Create restore directory structure
          RESTORE_DIR="/tmp/restore"
          mkdir -p "${RESTORE_DIR}"
          
          # Copy extracted files to restore directory
          if [[ -d /tmp/restore_extract ]]; then
            # Find the extracted backup directory
            BACKUP_DIR=$(find /tmp/restore_extract -maxdepth 2 -type d -name "*backup*" | head -1)
            
            if [[ -n "$BACKUP_DIR" ]]; then
              # Copy database if exists
              if [[ -f "${BACKUP_DIR}/database/webui.db" ]]; then
                cp "${BACKUP_DIR}/database/webui.db" "${RESTORE_DIR}/webui.db"
                echo "✅ Database copied for restore"
              fi
              
              # Copy secret key
              if [[ -f "${BACKUP_DIR}/.webui_secret_key" ]]; then
                cp "${BACKUP_DIR}/.webui_secret_key" "${RESTORE_DIR}/.webui_secret_key"
                echo "✅ Secret key copied for restore"
              fi
            fi
          fi
          
          # Create restore marker
          echo '{"restore": true, "timestamp": "'$(date -Iseconds)'", "commit": "'${{ github.sha }}'"}' > "${RESTORE_DIR}/restore_info.json"
          
          # Create tar for upload
          cd /tmp
          tar -czf restore_package.tar.gz -C /tmp restore/
          
          echo "📦 Restore package created"

      - name: Configure Railway for restore
        run: |
          echo "⚙️ Configuring Railway for restore..."
          
          export PATH="$HOME/.railway/bin:$PATH"
          
          # Enable backup restore on startup and align bucket/prefix with the bootstrap script
          railway variables set ENABLE_BACKUP_RESTORE_ON_STARTUP="true"
          railway variables set SUPABASE_BUCKET="${SUPABASE_BUCKET}"
          railway variables set BACKUP_PREFIX="${BACKUP_PREFIX}"
          railway variables set SUPABASE_PROJECT_REF="${SUPABASE_PROJECT_REF}"
          railway variables set SUPABASE_ACCESS_TOKEN="${SUPABASE_ACCESS_TOKEN}"
          
          echo "✅ Railway configured for restore"

      - name: Trigger Railway redeployment
        run: |
          echo "🚀 Triggering Railway redeployment with restore..."
          
          export PATH="$HOME/.railway/bin:$PATH"
          
          SERVICE_ID="${{ secrets.RAILWAY_SERVICE_ID }}"
          ENVIRONMENT_ID="${{ secrets.RAILWAY_ENVIRONMENT_ID }}"
          
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{
              "query": "mutation { serviceInstanceDeploy(serviceId: \"'"$SERVICE_ID"'\", environmentId: \"'"$ENVIRONMENT_ID"'\", latestCommit: true) { id deploymentId } }"
            }' | jq .
          
          echo "✅ Restore deployment triggered"
          echo ""
          echo "📝 The application will restore data on startup from the backup."

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to complete..."
          sleep 60
          
          export PATH="$HOME/.railway/bin:$PATH"
          railway status || true

      - name: Verify restore
        run: |
          sleep 30
          
          APP_URL="${{ vars.RAILWAY_APP_URL }}"
          
          echo "🔍 Verifying deployment..."
          
          if curl -sf "${APP_URL}/health"; then
            echo "✅ Health check passed"
          else
            echo "⚠️ Health check may still be pending"
          fi

  # ============================================================
  # Job 3: List Backups
  # ============================================================
  list-backups:
    name: List Available Backups
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'list'
    steps:
      - name: List GitHub Artifacts backups
        run: |
          echo "📋 Available backups:"
          echo ""
          echo "### GitHub Actions Artifacts ###"
          # Note: Would use GitHub API to list artifacts
          
      - name: List Supabase Storage backups
        if: env.SUPABASE_PROJECT_REF != ''
        run: |
          echo ""
          echo "### Supabase Storage ###"
          
          BACKUPS=$(curl -s \
            "https://api.supabase.com/v1/storage/${SUPABASE_BUCKET}/objects/list" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -d '{"prefix": "backups/", "sortBy": {"column": "created_at", "order": "desc"}, "limit": 10}' 2>/dev/null || echo "[]")
          
          echo "$BACKUPS" | jq -r '.[] | "- \(.name) (\(.metadata?.size || .size // 0 | . / 1024 / 1024 | floor)MB) - \(.created_at)"' 2>/dev/null || echo "No backups found"

  # ============================================================
  # Job 4: Verify Backup Integrity
  # ============================================================
  verify-backup:
    name: Verify Backup Integrity
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'verify'
    steps:
      - name: Download latest backup
        run: |
          echo "📥 Downloading latest backup for verification..."
          
          if [[ -n "$SUPABASE_PROJECT_REF" ]]; then
            LATEST_BACKUP=$(curl -s \
              "https://api.supabase.com/v1/storage/${SUPABASE_BUCKET}/objects/list" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -d '{"prefix": "backups/"}' 2>/dev/null | jq -r '.[-1].name' 2>/dev/null || echo "")
            
            if [[ -n "$LATEST_BACKUP" ]]; then
              curl -s -L \
                "https://api.supabase.com/v1/storage/${SUPABASE_BUCKET}/objects/download/${LATEST_BACKUP}" \
                -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                -o "/tmp/verify_backup.tar.gz"
              
              echo "✅ Downloaded: $LATEST_BACKUP"
            fi
          fi

      - name: Verify backup integrity
        run: |
          echo "🔍 Verifying backup integrity..."
          
          if [[ -f "/tmp/verify_backup.tar.gz" ]]; then
            # Check if it's a valid tar
            if tar -tzf "/tmp/verify_backup.tar.gz" > /dev/null 2>&1; then
              echo "✅ Archive integrity: PASSED"
              
              # Extract and check contents
              mkdir -p /tmp/verify_extract
              tar -xzf /tmp/verify_backup.tar.gz -C /tmp/verify_extract/
              
              # Check for required files
              BACKUP_DIR=$(find /tmp/verify_extract -maxdepth 2 -type d -name "*backup*" | head -1)
              
              if [[ -f "${BACKUP_DIR}/metadata.json" ]]; then
                echo "✅ Metadata found:"
                cat "${BACKUP_DIR}/metadata.json" | jq .
              fi
              
              # List contents
              echo ""
              echo "📁 Backup contents:"
              find "$BACKUP_DIR" -type f 2>/dev/null | head -20
              
              echo ""
              echo "✅ Backup verification: PASSED"
            else
              echo "❌ Archive integrity: FAILED"
              exit 1
            fi
          else
            echo "⚠️ No backup file found to verify"
          fi

  # ============================================================
  # Job 5: Summary Report
  # ============================================================
  summary:
    name: Backup Summary
    runs-on: ubuntu-latest
    needs: [backup, restore]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo ""
          echo "=========================================="
          echo "📊 Open Connect Backup Summary"
          echo "=========================================="
          echo "Run ID: ${{ github.run_id }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "Backup Job: ${{ needs.backup.result }}"
          echo "Restore Job: ${{ needs.restore.result }}"
          echo ""
          echo "Next scheduled backup: See workflow schedule"
          echo "=========================================="
