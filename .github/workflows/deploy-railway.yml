name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway via GraphQL API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID: b5eaa696-e7d5-4403-be0a-79a485e54537
          ENVIRONMENT_ID: 266408c3-17b9-4706-907a-3abc4acf1382
          SERVICE_ID: bb211eb9-3ebf-4e4d-84fc-f1e0e4ca5609
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEBUI_SECRET_KEY: ${{ secrets.WEBUI_SECRET_KEY }}
        run: |
          # Deploy the service
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{"query": "mutation { serviceInstanceDeploy(serviceId: \"'$SERVICE_ID'\", environmentId: \"'$ENVIRONMENT_ID'\", latestCommit: true) }"}'
          
          echo "Deployment triggered successfully"
