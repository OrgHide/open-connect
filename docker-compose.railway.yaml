version: '3.8'

services:
  open-connect:
    image: ghcr.io/org-hide/open-connect:latest
    build:
      context: .
      dockerfile: Dockerfile.railway
    container_name: open-connect
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - open-connect-data:/app/backend/data
      - open-connect-backups:/app/backend/backups
    environment:
      - ENV=prod
      - DOCKER=true
      - PORT=8080
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      - railway-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    networks:
      - railway-network

networks:
  railway-network:
    driver: bridge

volumes:
  ollama-models:
    driver: local
