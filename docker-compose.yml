version: '3.8'

services:
  xstack:
    build:
      context: .
      dockerfile: Dockerfile.railway
    container_name: open-connect-xstack
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=http://localhost:3000
      - MCP_GATEWAY=mcp://gateway
      - JWT_SECRET=${JWT_SECRET:-xstack-secret-key}
      - SESSION_SECRET=${SESSION_SECRET:-xstack-session-secret}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=xstack
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xstack-network

  postgres:
    image: postgres:15-alpine
    container_name: open-connect-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=xstack
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - xstack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: open-connect-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - xstack-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  xstack-network:
    driver: bridge
