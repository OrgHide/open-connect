services:
  # ===========================================
  # Open Connect - Production Docker Compose
  # ===========================================
  # Usage:
  #   Development: docker-compose up
  #   With Ollama: docker-compose --profile ollama up
  #   Production: docker-compose -f docker-compose.yaml -f docker-compose.prod.yaml up
  
  ollama:
    profiles:
      - ollama
    volumes:
      - ollama:/root/.ollama
    container_name: open-connect-ollama
    pull_policy: if-not-present
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    networks:
      - open-connect-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  open-webui:
    profiles:
      - default
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_HASH: ${BUILD_HASH:-dev-build}
    container_name: open-connect
    volumes:
      - open-webui-data:/app/backend/data
      - ./config/models.json:/app/config/models.json:ro
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    networks:
      - open-connect-network
    environment:
      # Core Settings
      - ENV=${ENV:-prod}
      - DOCKER=true
      - PORT=8080
      - HOST=0.0.0.0
      
      # WebUI Configuration
      - WEBUI_NAME=${WEBUI_NAME:-Open Connect}
      - WEBUI_URL=${WEBUI_URL:-http://localhost:3000}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - ENABLE_API_KEYS=${ENABLE_API_KEYS:-true}
      
      # Ollama Configuration
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_API_BASE_URL=${OLLAMA_API_BASE_URL:-http://ollama:11434/api}
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-true}
      
      # OpenAI/External API Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      
      # Hugging Face
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      
      # Groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      
      # Default Models (Free OpenRouter Models)
      - DEFAULT_MODELS=${DEFAULT_MODELS:-google/gemma-3-4b-it,qwen/qwen-2.5-7b-instruct,microsoft/phi-4,deepseek/deepseek-r1,anthropic/claude-3.5-haiku,meta/llama-3.1-8b-instruct}
      
      # Database Configuration
      - DATABASE_URL=${DATABASE_URL}
      - ENABLE_DB_MIGRATIONS=${ENABLE_DB_MIGRATIONS:-true}
      
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      
      # Google Vertex AI
      - GOOGLE_APPLICATION_CREDENTIALS_JSON=${GOOGLE_APPLICATION_CREDENTIALS_JSON}
      
      # Web Search Configuration
      - WEB_SEARCH=${WEB_SEARCH:-true}
      - WEB_SEARCH_CONFIRMATION=${WEB_SEARCH_CONFIRMATION:-true}
      - WEB_SEARCH_BYPASS_EMBEDDING=${WEB_SEARCH_BYPASS_EMBEDDING:-true}
      
      # Code Execution
      - CODE_EXECUTION=${CODE_EXECUTION:-true}
      - CODE_INTERPRETER=${CODE_INTERPRETER:-true}
      
      # RAG/Vector Search
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_RELEVANCE_THRESHOLD=${RAG_RELEVANCE_THRESHOLD:-0.5}
      
      # Whisper (Speech to Text)
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_MODEL_DIR=/app/backend/data/cache/whisper/models
      
      # Feature Flags
      - ENABLE_MEMORIES=${ENABLE_MEMORIES:-true}
      - ENABLE_NOTES=${ENABLE_NOTES:-true}
      - ENABLE_AUTOMATIONS=${ENABLE_AUTOMATIONS:-true}
      - ENABLE_MESSAGE_RATING=${ENABLE_MESSAGE_RATING:-true}
      - ENABLE_FOLDERS=${ENABLE_FOLDERS:-true}
      - ENABLE_CHANNELS=${ENABLE_CHANNELS:-true}
      - ENABLE_MODELS=${ENABLE_MODELS:-true}
      - ENABLE_DIRECT_CONNECTIONS=${ENABLE_DIRECT_CONNECTIONS:-true}
      - CACHE_BASE_MODEL_LIST=${CACHE_BASE_MODEL_LIST:-true}
      
      # JWT Configuration
      - JWT_EXPIRY=${JWT_EXPIRY:-4w}
      
      # CORS Configuration
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-*}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-*}
      
      # File Upload
      - MAX_FILE_UPLOAD_SIZE=${MAX_FILE_UPLOAD_SIZE:-100}
      
      # Task Configuration
      - TASK_MODEL=${TASK_MODEL:-google/gemma-3-4b-it}
      - TASK_MODEL_EXTERNAL=${TASK_MODEL_EXTERNAL:-google/gemma-3-4b-it}
      
      # Audio Configuration
      - AUDIO_TTS_ENABLED=${AUDIO_TTS_ENABLED:-true}
      - AUDIO_STT_ENABLED=${AUDIO_STT_ENABLED:-true}
      
      # Logging
      - GLOBAL_LOG_LEVEL=${GLOBAL_LOG_LEVEL:-INFO}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      
      # Health Monitoring
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-30}
      - ENABLE_BACKUP_RESTORE_ON_STARTUP=${ENABLE_BACKUP_RESTORE_ON_STARTUP:-false}
      
      # Analytics
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    profiles:
      - default
    container_name: open-connect-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - open-connect-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  open-connect-network:
    driver: bridge

volumes:
  ollama:
    driver: local
  open-webui-data:
    driver: local
  redis-data:
    driver: local
